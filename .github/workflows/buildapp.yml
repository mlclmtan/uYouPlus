# Original idea by @ISnackable. Thanks to him for handling the hardest parts!
# https://github.com/ISnackable/CercubePlus/blob/main/.github/workflows/Build.yml

name: Build and Release uYouPlus

on:
  workflow_dispatch:
    inputs:
      uyou_version:
        description: "The version of uYou"
        default: "3.0.4"
        required: true
        type: string
      uyou_url:
        description: "The URL for download uYou"
        default: "https://something.url/uyou.deb"
        required: false
        type: string
      decrypted_youtube_url:
        description: "Direct URL to the decrypted YouTube ipa. Leave blank to auto-scrape decrypt.day for the latest version."
        default: ""
        required: false
        type: string
      bundle_id:
        description: "Modify the bundle ID. Not recommended"
        default: "com.google.ios.youtube"
        required: true
        type: string
      app_name:
        description: "Modify the name of the app on the Home Screen. Not recommended"
        default: "YouTube"
        required: true
        type: string
      publish:
        description: "Auto-publish the release (uncheck to keep as draft)"
        default: true
        required: false
        type: boolean
      force:
        description: "Rebuild even if a release already exists for this YouTube + uYou version pair"
        default: false
        required: false
        type: boolean
      upload_artifact:
        description: "Upload Artifact"
        default: false
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build uYouPlus
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout Main
        uses: actions/checkout@v4.2.1
        with:
          path: main
          submodules: recursive

      - name: Caching brew dependencies
        id: brew_cache
        uses: tecolicom/actions-use-homebrew-tools@v1.2
        with:
          tools: ldid dpkg make
          cache: yes

      - name: Install Dependencies
        if: steps.brew_cache.outputs.cache-hit != 'true'
        run: brew install ldid dpkg make

      - name: Set PATH environment variable
        run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Setup Theos
        uses: actions/checkout@v4.2.1
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Caching SDK
        id: SDK
        uses: actions/cache@v4
        env:
          cache-name: iOS-16.5-SDK
        with:
          path: theos/sdks/
          key: ${{ env.cache-name }}

      - name: Download iOS 16.5 SDK
        if: steps.SDK.outputs.cache-hit != 'true'
        run: |
          git clone -n --depth=1 --filter=tree:0 https://github.com/theos/sdks.git && cd sdks
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mv *.sdk $THEOS/sdks
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Setup Theos Jailed
        uses: actions/checkout@v4.2.1
        with:
          repository: qnblackcat/theos-jailed
          ref: master
          path: theos-jailed
          submodules: recursive

      - name: Install Theos Jailed
        run: |
          ./theos-jailed/install
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Resolve YouTube IPA URL
        id: resolve_url
        env:
          USER_URL: ${{ inputs.decrypted_youtube_url }}
          REPO_DIR: ${{ github.workspace }}/main
          DECRYPTDAY_EMAIL: ${{ secrets.DECRYPTDAY_EMAIL }}
          DECRYPTDAY_PASSWORD: ${{ secrets.DECRYPTDAY_PASSWORD }}
        run: |
          if [ -n "$USER_URL" ]; then
            echo "Using user-provided URL"
            echo "url=$USER_URL" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$DECRYPTDAY_EMAIL" ] || [ -z "$DECRYPTDAY_PASSWORD" ]; then
            echo "::error::DECRYPTDAY_EMAIL and DECRYPTDAY_PASSWORD secrets are not set in this repo. Set them with 'gh secret set DECRYPTDAY_EMAIL --repo ${{ github.repository }}' (and same for PASSWORD), then re-run."
            exit 1
          fi
          echo "No URL provided; scraping decrypt.day with Playwright..."
          SCRAPER_DIR="$RUNNER_TEMP/scraper"
          mkdir -p "$SCRAPER_DIR"
          cp "$REPO_DIR/.github/scripts/scrape-decryptday.mjs" "$SCRAPER_DIR/"
          cd "$SCRAPER_DIR"
          npm init -y >/dev/null
          npm install --no-save --no-audit --no-fund playwright@1.59.1
          npx playwright install chromium
          node scrape-decryptday.mjs >> "$GITHUB_OUTPUT"

      - name: Upload scraper diagnostics on failure
        if: failure() && steps.resolve_url.conclusion == 'failure'
        uses: actions/upload-artifact@v4.4.3
        with:
          name: scraper-diagnostics
          path: ${{ runner.temp }}/scraper/*.{png,html}
          if-no-files-found: ignore
          retention-days: 7

      - name: Prepare YouTube iPA
        id: prepare_youtube
        run: |
          wget "$YOUTUBE_URL" --no-verbose -O main/YouTube.ipa
          cd ${{ github.workspace }}/main
          mv YouTube.ipa YouTube.zip
          unzip -q YouTube.zip
          youtube_version=$(defaults read "$(pwd)/Payload/YouTube.app/Info" CFBundleVersion)
          echo "==> YouTube v$youtube_version downloaded!"
          sed -i '' "17s#.*#YOUTUBE_VERSION = ${youtube_version}#g" Makefile
          echo "youtube_version=${youtube_version}" >> $GITHUB_OUTPUT

        env:
          THEOS: ${{ github.workspace }}/theos
          YOUTUBE_URL: ${{ steps.resolve_url.outputs.url }}

      - name: Check if already released
        id: dedup
        if: ${{ !inputs.force }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          YOUTUBE_VERSION: ${{ steps.prepare_youtube.outputs.youtube_version }}
          UYOU_VERSION: ${{ inputs.uyou_version }}
        run: |
          tag_prefix="v${YOUTUBE_VERSION}-${UYOU_VERSION}-"
          existing=$(gh release list --limit 50 --json tagName --jq ".[] | select(.tagName | startswith(\"${tag_prefix}\")) | .tagName" | head -n1)
          if [ -n "$existing" ]; then
            echo "::notice::Already released as ${existing}; skipping build. Re-run with force=true to rebuild."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No existing release for ${tag_prefix}*; proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fix compiling & Build Package
        id: build_package
        if: steps.dedup.outputs.skip != 'true'
        run: |
          mkdir -p theos/lib/iphone/rootless
          cd ${{ github.workspace }}/main
          sed -i '' "27s#.*#BUNDLE_ID = ${{ env.BUNDLE_ID }}#g" Makefile
          sed -i '' "26s#.*#DISPLAY_NAME = ${{ env.APP_NAME }}#g" Makefile
          make package THEOS_PACKAGE_SCHEME=rootless IPA=Payload/YouTube.app FINALPACKAGE=1
          echo "package=$(ls -t packages | head -n1)" >>$GITHUB_OUTPUT
          echo -e "==> \033[1mSHASUM256: $(shasum -a 256 packages/*.ipa | cut -f1 -d' ')\033[0m"
          echo -e "==> \033[1mBundle ID: ${{ env.BUNDLE_ID }}\033[0m"

        env:
          THEOS: ${{ github.workspace }}/theos
          UYOU_VERSION: ${{ inputs.uyou_version }}
          UYOU_URL: ${{ inputs.uyou_url }}
          BUNDLE_ID: ${{ inputs.bundle_id }}
          APP_NAME: ${{ inputs.app_name }}

      - name: Upload Artifact
        if: ${{ inputs.upload_artifact && steps.dedup.outputs.skip != 'true' }}
        uses: actions/upload-artifact@v4.4.3
        env:
          UYOU_VERSION: ${{ inputs.uyou_version }}
          YOUTUBE_VERSION: ${{ steps.prepare_youtube.outputs.youtube_version }}
        with:
          name: uYouPlus_${{ env.YOUTUBE_VERSION }}_${{ env.UYOU_VERSION }}
          path: ${{ github.workspace }}/main/packages/${{ steps.build_package.outputs.package }}
          if-no-files-found: error

      - name: Create Release
        id: create_release
        if: steps.dedup.outputs.skip != 'true'
        uses: qnblackcat/action-gh-release@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UYOU_VERSION: ${{ inputs.uyou_version }}
          YOUTUBE_VERSION: ${{ steps.prepare_youtube.outputs.youtube_version }}
          DRAFT: ${{ !inputs.publish }}
        with:
          tag_name: v${{ env.YOUTUBE_VERSION }}-${{ env.UYOU_VERSION }}-(${{ github.run_number }})
          name: v${{ env.YOUTUBE_VERSION }}-${{ env.UYOU_VERSION }}-(${{ github.run_number }})
          files: main/packages/*.ipa
          draft: ${{ env.DRAFT }}
